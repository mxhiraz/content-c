services:
  redis:
    image: redis:7-alpine
    container_name: ai-carousel-redis
    restart: unless-stopped
    volumes:
      - ./out/.redis:/data
    command: ["redis-server", "--appendonly", "yes"]

  carousel:
    build: .
    image: ai-carousel-factory:latest
    container_name: ai-carousel-factory
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    ports:
      - "18080:8080"   # config UI → http://server:18080
      - "13000:3000"   # queue server (bull-board + webhook) → /queue dashboard
    volumes:
      - ./out:/app/out
    shm_size: "1gb"
    cap_add:
      - SYS_ADMIN
