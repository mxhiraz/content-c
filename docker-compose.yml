services:
  redis:
    image: redis:7-alpine
    container_name: ai-carousel-redis
    restart: unless-stopped
    volumes:
      - ./out/.redis:/data
    command: ["redis-server", "--appendonly", "yes"]

  carousel:
    build: .
    image: ai-carousel-factory:latest
    container_name: ai-carousel-factory
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
      # Force container clock TZ. Without this Azure VM defaults to UTC and bullmq
      # cron tz=Asia/Kolkata can race against date calls in the codebase. Match the
      # SCHEDULE_TZ in .env. tzdata is pre-installed in node:bookworm-slim.
      TZ: ${SCHEDULE_TZ:-Asia/Kolkata}
    env_file:
      - .env
    ports:
      - "8080:8080"    # config UI → http://server:8080
      - "6060:3000"    # queue server (bull-board + webhook) → http://server:6060/queue
    volumes:
      - ./out:/app/out
    shm_size: "1gb"
    cap_add:
      - SYS_ADMIN
